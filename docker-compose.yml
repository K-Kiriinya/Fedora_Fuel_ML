services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: fedora-fuel-api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:z
      - ./data/uploads:/app/data/uploads:z
      - ./data/processed:/app/data/processed:z
      - ./data/runs:/app/data/runs:z
    env_file:
      - .env
    environment:
      - DEBUG=True
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app/src
    restart: unless-stopped
    # Use uvicorn with reload for development instead of gunicorn
    command: uvicorn fuel_pricing.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis for future caching addition
  redis:
    image: redis:7-alpine
    container_name: fedora-fuel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
